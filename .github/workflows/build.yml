name: 扩展构建与产物输出

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Weekly build to ensure dependencies remain compatible
    - cron: '0 0 * * 0'

env:
  BUILD_TYPE: Release
  VCPKG_COMMIT: 42f37e46d37baf7b218966434b91116bddf73461

jobs:
  build-windows:
    name: Windows 扩展构建
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Ninja
      uses: ashutoshvarma/setup-ninja@master
      with:
        ninja-version: '1.11.1'

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '42f37e46d37baf7b218966434b91116bddf73461'

    - name: Configure CMake
      run: |
        cmake --preset=release
      shell: pwsh

    - name: Build
      run: cmake --build build/release --config Release

    - name: Test
      working-directory: ${{github.workspace}}/build/release
      run: ctest -C Release --output-on-failure

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gis-ai-windows
        path: |
          build/release/lib/*.dll
          build/release/lib/*.lib

  build-linux:
    name: Linux 扩展构建
    runs-on: ubuntu-22.04

    env:
      CC: gcc-11
      CXX: g++-11

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ninja-build \
          g++-11 \
          libgdal-dev \
          libgeos-dev \
          libproj-dev \
          libspdlog-dev \
          libgtest-dev

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '42f37e46d37baf7b218966434b91116bddf73461'

    - name: Configure CMake
      run: |
        cmake -B build/release -DCMAKE_BUILD_TYPE=Release -DGIS_AI_BUILD_TESTS=ON

    - name: Build
      run: cmake --build build/release -j$(nproc)

    - name: Test
      working-directory: ${{github.workspace}}/build/release
      run: ctest --output-on-failure

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gis-ai-linux
        path: |
          build/release/lib/*.so
          build/release/lib/*.a

  build-macos:
    name: macOS 扩展构建
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Ninja
      uses: ashutoshvarma/setup-ninja@master
      with:
        ninja-version: '1.11.1'

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '42f37e46d37baf7b218966434b91116bddf73461'

    - name: Configure CMake
      run: |
        cmake -B build/release -DCMAKE_BUILD_TYPE=Release -DGIS_AI_BUILD_TESTS=ON

    - name: Build
      run: cmake --build build/release -j$(sysctl -n hw.ncpu)

    - name: Test
      working-directory: ${{github.workspace}}/build/release
      run: ctest --output-on-failure

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gis-ai-macos
        path: |
          build/release/lib/*.dylib
          build/release/lib/*.a

  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get install -y clang-format-14

    - name: Check code formatting
      run: |
        find src include -name "*.h" -o -name "*.cpp" | xargs clang-format-14 --dry-run --Werror

    - name: Install cppcheck
      run: |
        sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,performance,portability --error-exitcode=1 \
          --suppress=missingIncludeSystem \
          src/ include/
