name: 核心持续集成

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release
  VCPKG_COMMIT: 256acc64012b23a13041d8705805e1f23b43a024

jobs:
  build-windows:
    name: Windows 核心校验
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Configure CMake
        run: cmake --preset=release

      - name: Build Release
        run: cmake --build build/release --config Release

      - name: Test Release
        working-directory: build/release
        run: ctest -C Release --output-on-failure -E test_ai_integration

      - name: Install
        run: cmake --install build/release --prefix install-check

      - name: Verify install tree
        shell: pwsh
        run: |
          $binDir = "install-check/bin"
          if (-not (Test-Path (Join-Path $binDir "gis-ai-gui.exe"))) { throw "GUI exe missing" }
          if (-not (Test-Path (Join-Path $binDir "gis_ai_cli.exe"))) { throw "CLI exe missing" }
